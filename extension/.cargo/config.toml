[target.wasm32-unknown-emscripten]
rustflags = [
    "-C", "link-args=-pthread",
    "-C", "target-feature=+atomics",
    "-C", "link-args=-sSIDE_MODULE=2",
    "-C", "llvm-args=-enable-emscripten-cxx-exceptions=0",
    "-Z", "default-visibility=hidden",
    "-Z", "link-native-libraries=no",
]

# Pass required C compiler flags for bundled SQLite when targeting WASM.
# The `cc` crate used by `libsqlite3-sys` reads this env var (note: underscores).
# -fPIC        : required by wasm-ld in SIDE_MODULE mode
# -matomics    : required because Godot's WASM uses -pthread / shared memory
# -mbulk-memory: required alongside -matomics for WASM threading support
[env]
CFLAGS_wasm32_unknown_emscripten = "-fPIC -matomics -mbulk-memory"
