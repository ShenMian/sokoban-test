name: CI

on: [pull_request, push]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Cache Cargo artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            extension/target/
          key: cargo-${{ runner.os }}-${{ github.job }}-${{ github.ref_name }}-${{ hashFiles('extension/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ github.job }}-${{ github.ref_name }}-
            cargo-${{ runner.os }}-${{ github.job }}-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Run cargo fmt
        run: cargo +nightly fmt --manifest-path extension/Cargo.toml --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Cache Cargo artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            extension/target/
          key: cargo-${{ runner.os }}-${{ github.job }}-${{ github.ref_name }}-${{ hashFiles('extension/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ github.job }}-${{ github.ref_name }}-
            cargo-${{ runner.os }}-${{ github.job }}-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run clippy lints
        run: cargo clippy --manifest-path extension/Cargo.toml --locked --workspace --all-targets --all-features -- --deny warnings
